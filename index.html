<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026年进度</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #f5c842;
      --gold-light: #ffe680;
      --sand: #c8a96e;
      --glass: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.15);
    }

    body {
      min-height: 100vh;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
      transition: color 2s ease;
    }

    /* ===== SKY CANVAS ===== */
    #sky-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      transition: opacity 3s ease;
    }

    /* ===== STAR FIELD ===== */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      transition: opacity 3s ease;
    }
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      opacity: 0;
      animation: twinkle var(--dur, 3s) infinite var(--delay, 0s);
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(1); }
      50% { opacity: var(--bright, 0.8); transform: scale(1.5); }
    }

    /* ===== CLOUDS ===== */
    .clouds {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
      transition: opacity 3s ease;
    }
    .cloud {
      position: absolute;
      border-radius: 50%;
      filter: blur(18px);
      animation: drift var(--speed, 80s) linear infinite;
      opacity: var(--cloud-opacity, 0.6);
    }
    @keyframes drift {
      from { transform: translateX(-300px); }
      to   { transform: translateX(calc(100vw + 300px)); }
    }

    /* ===== SUN ===== */
    .sun {
      position: fixed;
      pointer-events: none;
      z-index: 2;
      border-radius: 50%;
      transition: opacity 3s ease, background 3s ease, box-shadow 3s ease, left 3s ease, top 3s ease, width 3s ease, height 3s ease;
    }

    /* ===== CONTENT ===== */
    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem 1.5rem;
      width: min(720px, 96vw);
    }

    .title {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, #fff 0%, var(--gold-light) 40%, var(--gold) 70%, var(--sand) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.4rem;
      filter: drop-shadow(0 0 18px rgba(245,200,66,0.4));
    }

    .subtitle {
      font-size: 0.95rem;
      letter-spacing: 0.2em;
      margin-bottom: 2.4rem;
      text-transform: uppercase;
      transition: color 3s ease;
    }

    .clock-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 1.4rem 2rem;
      margin-bottom: 2.4rem;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .clock-date {
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      margin-bottom: 0.3rem;
      transition: color 3s ease;
    }

    .clock-time {
      font-size: clamp(2.4rem, 7vw, 4rem);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, #fff 0%, #c0d4ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    /* Time of day indicator */
    .tod-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4em;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      padding: 0.2em 0.8em;
      border-radius: 20px;
      margin-top: 0.6rem;
      transition: background 3s ease, color 3s ease, border-color 3s ease;
    }
    .tod-icon { font-size: 0.95rem; }

    .percent-section { margin-bottom: 2.4rem; }

    .hourglass-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.4rem;
      margin-bottom: 1.2rem;
    }

    .hourglass-svg {
      width: 60px;
      height: 80px;
      filter: drop-shadow(0 0 10px rgba(245,200,66,0.5));
      flex-shrink: 0;
    }

    .percent-number {
      font-size: clamp(2.2rem, 7vw, 4rem);
      font-weight: 900;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(135deg, #ffffff 0%, var(--gold-light) 35%, var(--gold) 65%, #e09a10 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(245,200,66,0.5));
      letter-spacing: -0.01em;
    }

    .percent-label {
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      margin-top: 0.5rem;
      transition: color 3s ease;
    }

    .progress-wrap {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 1.8rem 2rem 2rem;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.08);
      margin-bottom: 2rem;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      transition: color 3s ease;
    }

    .progress-track {
      width: 100%;
      height: 18px;
      background: rgba(255,255,255,0.08);
      border-radius: 9px;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.3);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #e09a10 0%, var(--gold) 40%, var(--gold-light) 80%, #fff9d0 100%);
      border-radius: 9px;
      transition: width 0.8s ease;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 12px rgba(245,200,66,0.6), 0 0 24px rgba(245,200,66,0.3);
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
      animation: shimmer 2.5s infinite;
    }
    @keyframes shimmer {
      0% { left: -60%; }
      100% { left: 130%; }
    }

    .days-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.8rem;
    }

    .day-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 1rem 0.6rem;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }

    .day-card .num {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(135deg, #fff 0%, var(--gold-light) 60%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
    }

    .day-card .lbl {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      margin-top: 0.25rem;
      transition: color 3s ease;
    }

    .footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      transition: color 3s ease;
    }

    .pulse-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      background: #6bff9e;
      border-radius: 50%;
      margin-right: 0.4em;
      vertical-align: middle;
      animation: pulse-anim 1.5s infinite;
      box-shadow: 0 0 6px #6bff9e;
    }
    @keyframes pulse-anim {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.6); }
    }
  </style>
</head>

  <div class="footer" id="footer">实时更新 · 每秒刷新</div>
</div>

  // Linear interpolate between two hex colors
  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return [r,g,b];
  }
  function lerpColor(c1, c2, t) {
    const [r1,g1,b1] = hexToRgb(c1);
    const [r2,g2,b2] = hexToRgb(c2);
    const r = Math.round(r1 + (r2-r1)*t);
    const g = Math.round(g1 + (g2-g1)*t);
    const b = Math.round(b1 + (b2-b1)*t);
    return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
  }
  function lerpRgba(a, b, t) {
    // parse rgba(r,g,b,a) or hex
    function parse(s) {
      const m = s.match(/rgba?\((\d+\.?\d*),\s*(\d+\.?\d*),\s*(\d+\.?\d*)(?:,\s*(\d+\.?\d*))?\)/);
      if (m) return [+m[1],+m[2],+m[3],m[4]!==undefined?+m[4]:1];
      if (s.startsWith('#')) { const [r,g,b]=hexToRgb(s); return [r,g,b,1]; }
      return [0,0,0,0];
    }
    const ca = parse(a), cb = parse(b);
    const r = ca.map((v,i) => v + (cb[i]-v)*t);
    return `rgba(${Math.round(r[0])},${Math.round(r[1])},${Math.round(r[2])},${r[3].toFixed(3)})`;
  }

  // Get current phase and lerp factor
  function getPhaseData(hourFloat) {
    const phases = PHASES;
    // wrap 24 → 0 for next-phase lookup
    for (let i = 0; i < phases.length; i++) {
      const nextIdx = (i + 1) % phases.length;
      const curr = phases[i].h;
      const next = nextIdx === 0 ? 24 : phases[nextIdx].h;
      if (hourFloat >= curr && hourFloat < next) {
        const t = (hourFloat - curr) / (next - curr);
        return { a: phases[i], b: phases[nextIdx], t };
      }
    }
    return { a: phases[phases.length-1], b: phases[0], t: 0 };
  }

  // Draw sky gradient on canvas
  const canvas = document.getElementById('sky-canvas');
  const ctx = canvas.getContext('2d');

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function lerpSkyColors(colsA, colsB, t) {
    const len = Math.max(colsA.length, colsB.length);
    const result = [];
    for (let i = 0; i < len; i++) {
      const ca = colsA[Math.min(i, colsA.length-1)];
      const cb = colsB[Math.min(i, colsB.length-1)];
      result.push(lerpColor(ca, cb, t));
    }
    return result;
  }

  function drawSky(colors) {
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    colors.forEach((c, i) => {
      grad.addColorStop(i / (colors.length - 1), c);
    });
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // ===== Stars =====
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 140; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const big = Math.random() < 0.18;
    s.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --dur:${(Math.random()*4+2).toFixed(1)}s;
      --delay:${(Math.random()*6).toFixed(1)}s;
      --bright:${(Math.random()*0.5+0.3).toFixed(2)};
      width:${big?3:2}px;
      height:${big?3:2}px;
    `;
    starsEl.appendChild(s);
  }

  // ===== Clouds =====
  const cloudsEl = document.getElementById('clouds');
  const CLOUD_DEFS = [
    { top: '8%',  width: 280, height: 80,  speed: 110, delay: 0,    startX: '10vw' },
    { top: '14%', width: 180, height: 55,  speed: 85,  delay: -30,  startX: '35vw' },
    { top: '20%', width: 320, height: 90,  speed: 130, delay: -55,  startX: '60vw' },
    { top: '28%', width: 160, height: 50,  speed: 70,  delay: -20,  startX: '80vw' },
    { top: '10%', width: 240, height: 70,  speed: 95,  delay: -70,  startX: '50vw' },
    { top: '22%', width: 200, height: 60,  speed: 100, delay: -45,  startX: '20vw' },
  ];
  const cloudEls = CLOUD_DEFS.map(def => {
    const c = document.createElement('div');
    c.className = 'cloud';
    c.style.cssText = `
      top:${def.top};
      left:-${def.width}px;
      width:${def.width}px;
      height:${def.height}px;
      --speed:${def.speed}s;
      --cloud-opacity:0.6;
      animation-duration:${def.speed}s;
      animation-delay:${def.delay}s;
      transform:translateX(${def.startX});
      background: rgba(255,255,255,0.7);
    `;
    cloudsEl.appendChild(c);
    return c;
  });

  // ===== Sun =====
  const sunEl = document.getElementById('sun');

  // ===== Apply time-of-day styles =====
  let lastPhaseIdx = -1;

  function applyTimeTheme(hourFloat) {
    const { a, b, t } = getPhaseData(hourFloat);

    // Sky gradient
    const colors = lerpSkyColors(a.sky, b.sky, t);
    drawSky(colors);

    // Stars
    const starOp = a.starOpacity + (b.starOpacity - a.starOpacity) * t;
    starsEl.style.opacity = starOp;

    // Clouds
    const cloudOp = a.cloudOpacity + (b.cloudOpacity - a.cloudOpacity) * t;
    cloudsEl.style.opacity = cloudOp;
    const cloudColorA = a.cloudColor || 'rgba(255,255,255,0.7)';
    const cloudColorB = b.cloudColor || 'rgba(255,255,255,0.7)';
    const cloudColor = lerpRgba(cloudColorA, cloudColorB, t);
    cloudEls.forEach(c => { c.style.background = cloudColor; });

    // Sun
    const sunOp = a.sunOpacity + (b.sunOpacity - a.sunOpacity) * t;
    const sunSz = (a.sunSize || 0) + ((b.sunSize || 0) - (a.sunSize || 0)) * t;
    sunEl.style.opacity = sunOp;
    sunEl.style.width = sunSz + 'px';
    sunEl.style.height = sunSz + 'px';
    sunEl.style.top = a.sunTop;
    sunEl.style.left = a.sunLeft;
    sunEl.style.marginLeft = -(sunSz/2) + 'px';
    sunEl.style.marginTop  = -(sunSz/2) + 'px';
    if (a.sunColor && a.sunColor !== 'transparent') {
      sunEl.style.background = a.sunColor;
      sunEl.style.boxShadow = a.sunGlow;
    } else {
      sunEl.style.background = 'transparent';
      sunEl.style.boxShadow = 'none';
    }

    // Text colors
    document.getElementById('subtitle').style.color = a.subtitleColor;
    document.getElementById('footer').style.color = a.footerColor;
    document.getElementById('date-str').style.color = a.textColor;
    document.getElementById('progress-header').style.color = a.textColor;
    document.querySelectorAll('.day-card .lbl').forEach(el => el.style.color = a.textColor);
    document.querySelectorAll('.percent-label').forEach(el => el.style.color = a.textColor);

    // Body text color for non-gradient text
    document.body.style.color = a.textColor;

    // Badge
    const badge = document.getElementById('tod-badge');
    badge.style.background = a.badge.bg;
    badge.style.color = a.badge.color;
    badge.style.border = `1px solid ${a.badge.border}`;
    document.getElementById('tod-icon').textContent = a.badge.icon;
    document.getElementById('tod-label').textContent = a.badge.label;
  }

  // ============================================================
  // Progress / clock logic
  // ============================================================
  function pad(n, len=2) { return String(n).padStart(len, '0'); }

  const WEEKDAYS = ['周日','周一','周二','周三','周四','周五','周六'];
  const MONTHS   = ['一月','二月','三月','四月','五月','六月',
                    '七月','八月','九月','十月','十一月','十二月'];

  function get2026Percent(now) {
    const start = new Date(2026, 0, 1, 0, 0, 0, 0).getTime();
    const end   = new Date(2026, 11, 31, 23, 59, 59, 999).getTime();
    const t     = now.getTime();
    if (t < start) return 0;
    if (t > end)   return 100;
    return (t - start) / (end - start) * 100;
  }

  function getDaysPassed(now) {
    const start = new Date(2026, 0, 1, 0, 0, 0, 0);
    return Math.max(0, (now - start) / (1000 * 60 * 60 * 24));
  }

  function updateHourglass(pct) {
    const upperTop = 6 + (38 - 6) * (pct / 100);
    const upperPts = `10,${upperTop} 50,${upperTop} 50,38 10,38`;
    document.getElementById('upper-sand').setAttribute('points', upperPts);
    document.getElementById('upper-sand2').setAttribute('points', upperPts);

    const lowerTop = 76 - (76 - 42) * (pct / 100);
    const frac = (76 - lowerTop) / 34;
    const lx = 28 - 18 * frac;
    const rx = 32 + 18 * frac;
    const lowerPts = `${lx},${lowerTop} ${rx},${lowerTop} 50,76 10,76`;
    document.getElementById('lower-sand').setAttribute('points', lowerPts);
    document.getElementById('lower-sand2').setAttribute('points', lowerPts);
  }

  function tick() {
    const now = new Date();

    document.getElementById('time-str').textContent =
      `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    document.getElementById('date-str').textContent =
      `${now.getFullYear()} 年 ${MONTHS[now.getMonth()]}  ${now.getDate()} 日  ${WEEKDAYS[now.getDay()]}`;

    const pct = get2026Percent(now);
    const pctStr = pct.toFixed(6) + '%';
    document.getElementById('percent-num').textContent = pctStr;
    document.getElementById('percent-inline').textContent = pctStr;
    document.getElementById('progress-fill').style.width = pct.toFixed(6) + '%';

    const daysPassed = getDaysPassed(now);
    const daysPassedInt = Math.floor(daysPassed);
    document.getElementById('days-passed').textContent = daysPassedInt;
    document.getElementById('days-left').textContent = Math.max(0, 365 - daysPassedInt);

    updateHourglass(pct);

    // Update sky every tick (smooth)
    const hourFloat = now.getHours() + now.getMinutes()/60 + now.getSeconds()/3600;
    applyTimeTheme(hourFloat);
  }

  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
